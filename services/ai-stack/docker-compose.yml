# --------------------------------------------------------------------------------
# AI Stack — Ollama + Open WebUI + OpenClaw + OpenCode + DCGM Exporter
# --------------------------------------------------------------------------------
# Local LLM inference stack for an NVIDIA RTX 3090 24 GB.
#
# Services:
#   - ollama:          Local LLM runtime (GPU-accelerated).
#   - open-webui:      Web UI for chatting with local models.
#   - openclaw:        Agent layer with OpenAI-compatible backend.
#   - opencode:        Browser-based coding agent backed by local Ollama.
#   - dcgm-exporter:   NVIDIA GPU metrics exporter for Prometheus.
#
# Monitoring:
#   DCGM exporter joins the existing 'monitoring' network so the homelab
#   Prometheus (services/monitoring) scrapes it directly. No separate
#   Prometheus or Grafana instance — dashboards live in the existing
#   Grafana provisioning directory.
#
# Networking:
#   - AI services share a private 'ai-stack' bridge network and communicate
#     by container name (e.g. open-webui → ollama:11434).
#   - dcgm-exporter also joins the external 'monitoring' network.
#   - Browser-facing UIs (Open WebUI, OpenCode) publish on the host.
#   - Ollama, OpenClaw, and DCGM Exporter remain bound to 127.0.0.1.
#
# GPU access:
#   - Only ollama and dcgm-exporter receive GPU device reservations.
#   - All other services are CPU-only.
#
# Usage:
#   cp .env.example .env   # edit secrets and paths
#   docker compose up -d
# --------------------------------------------------------------------------------

services:
  # ── Ollama — Local LLM Runtime ──────────────────────────────────────────
  # Serves models via REST API on port 11434.
  # Models are stored persistently in ${AI_ACTIVE_DATA_DIR}/ollama.
  ollama:
    image: ollama/ollama:latest
    container_name: ai-ollama
    restart: unless-stopped

    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"

    environment:
      - TZ=${TZ}
      # Only keep 1 model loaded — the 3090 cannot hold two 32B models.
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      # Parallel request slots — 1 is the safest default on a 24 GB 3090.
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      # Enable flash attention for faster inference and lower VRAM usage.
      - OLLAMA_FLASH_ATTENTION=1
      # Allow connections from other containers on the Docker network.
      - OLLAMA_HOST=0.0.0.0

    volumes:
      - ${AI_ACTIVE_DATA_DIR}/ollama:/root/.ollama
      - ${AI_ACTIVE_DATA_DIR}/lora-adapters:/lora-adapters:ro
      - ./Modelfile.persona.example:/models/Modelfile.persona:ro

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    networks:
      - ai-stack

  # ── Open WebUI — Chat Interface ─────────────────────────────────────────
  # Full-featured web UI for interacting with Ollama models.
  # Stores chat history, user accounts, and settings in a local SQLite DB.
  open-webui:
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:v0.8.10}
    container_name: ai-open-webui
    restart: unless-stopped

    depends_on:
      ollama:
        condition: service_healthy

    ports:
      - "${OPEN_WEBUI_PORT:-8080}:8080"

    environment:
      - TZ=${TZ}
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${OPEN_WEBUI_SECRET_KEY}
      - CORS_ALLOW_ORIGIN=${OPEN_WEBUI_CORS_ALLOW_ORIGIN}
      - USER_AGENT=${OPEN_WEBUI_USER_AGENT:-homelab-blueprint-open-webui/1.0}
      - HF_TOKEN=${OPEN_WEBUI_HF_TOKEN:-}
      # Disable telemetry.
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      # Disable signup after first admin account is created.
      - ENABLE_SIGNUP=${OPEN_WEBUI_ENABLE_SIGNUP:-false}

    volumes:
      - ${AI_ACTIVE_DATA_DIR}/open-webui:/app/backend/data

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    networks:
      - ai-stack

  # ── OpenCode — Browser-Based Coding Agent ───────────────────────────────
  # Web UI and agent runtime for code tasks against the checked-out repo.
  # Uses Ollama through an OpenAI-compatible provider config.
  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    container_name: ai-opencode
    restart: unless-stopped

    depends_on:
      ollama:
        condition: service_healthy

    working_dir: /workspace
    command: ["web", "--hostname=0.0.0.0", "--port=4096"]

    ports:
      - "${OPENCODE_PORT:-4096}:4096"

    environment:
      - TZ=${TZ}
      - HOME=/data
      - XDG_CONFIG_HOME=/data/config
      - XDG_DATA_HOME=/data/share
      - OPENCODE_CONFIG=/config/opencode.json
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_DISABLE_AUTOUPDATE=true
      - OPENCODE_MODEL=${OPENCODE_MODEL:-ollama/qwen3-coder-next}
      - OPENCODE_SMALL_MODEL=${OPENCODE_SMALL_MODEL:-ollama/qwen3.5:9b}

    volumes:
      - ${AI_ACTIVE_DATA_DIR}/opencode:/data
      - ../../:/workspace:rw
      - ./config/opencode/opencode.json:/config/opencode.json:ro

    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u \"$${OPENCODE_SERVER_USERNAME:-opencode}:$${OPENCODE_SERVER_PASSWORD}\" http://localhost:4096/global/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

    networks:
      - ai-stack

  # ── OpenClaw — Optional Agent Layer ────────────────────────────────────
  # This service is disabled by default behind the `openclaw` profile.
  # The upstream OpenClaw Docker deployment uses a different gateway-first
  # compose layout than this homelab stack, so treat this service as an
  # experimental integration point rather than part of the default boot set.
  #
  # Default startup (safe):
  #   docker compose up -d
  #
  # Opt-in startup (experimental):
  #   docker compose --profile openclaw up -d openclaw
  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: ai-openclaw
    restart: unless-stopped
    profiles: ["openclaw"]

    depends_on:
      ollama:
        condition: service_healthy

    ports:
      - "127.0.0.1:${OPENCLAW_PORT:-8081}:8080"

    environment:
      - TZ=${TZ}
      # Point to Ollama's OpenAI-compatible endpoint.
      - OPENAI_API_BASE=http://ollama:11434/v1
      - OPENAI_API_KEY=not-needed
      - DEFAULT_MODEL=${OPENCLAW_DEFAULT_MODEL:-qwen3.5:27b}
      - CONFIG_PATH=/config/config.yaml

    volumes:
      - ${AI_ACTIVE_DATA_DIR}/openclaw:/data
      - ./config/openclaw:/config:ro

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    networks:
      - ai-stack

  # ── DCGM Exporter — GPU Metrics ─────────────────────────────────────────
  # Exposes NVIDIA GPU metrics (utilization, VRAM, temperature, power,
  # clocks) in Prometheus format on port 9400.
  # Joins the external 'monitoring' network so the homelab Prometheus
  # (services/monitoring) can scrape it by container name.
  #
  # Note: On consumer GPUs (GeForce/RTX), some datacenter-specific DCGM
  # metrics may be unavailable. Core metrics (utilization, memory, temp,
  # power, clocks) work reliably. If DCGM fails to start on your GPU,
  # see the troubleshooting section in guide/AI_STACK.md for alternatives.
  dcgm-exporter:
    image: nvidia/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: ai-dcgm-exporter
    restart: unless-stopped

    ports:
      - "127.0.0.1:${DCGM_EXPORTER_PORT:-9400}:9400"

    environment:
      - TZ=${TZ}

    cap_add:
      - SYS_ADMIN

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/usr/bin/bash -lc 'exec 3<>/dev/tcp/127.0.0.1/9400 && printf \"GET /metrics HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q \"^# HELP\\|^DCGM_\" <&3' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - ai-stack
      - monitoring

  # ── Training — Persona LoRA Workspace ──────────────────────────────────
  # Opt-in GPU training container for preprocessing, QLoRA runs, adapter
  # export, and experiment logging. Only starts when the `training` profile
  # is explicitly requested.
  training:
    image: ${AI_TRAINING_IMAGE:-unsloth/unsloth:latest}
    container_name: ai-training
    profiles: ["training"]
    user: "0:0"
    working_dir: /workspace
    command: ["/bin/bash", "/repo/services/ai-stack/scripts/start_training_container.sh"]
    stdin_open: true
    tty: true
    shm_size: "16gb"

    environment:
      - TZ=${TZ}
      - PYTHONUNBUFFERED=1
      - HF_HOME=/workspace/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/workspace/.cache/huggingface
      - TRANSFORMERS_CACHE=/workspace/.cache/huggingface
      - AI_TRAINING_AUTO_FIX_TRANSFORMERS=${AI_TRAINING_AUTO_FIX_TRANSFORMERS:-true}
      - AI_TRAINING_TRANSFORMERS_VERSION=${AI_TRAINING_TRANSFORMERS_VERSION:-5.2.0}

    volumes:
      - ${AI_ACTIVE_DATA_DIR}/training:/workspace
      - ${AI_ACTIVE_DATA_DIR}/lora-adapters:/output
      - ${AI_ARCHIVE_DATA_DIR}:/archive
      - ../../:/repo:ro

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

    networks:
      - ai-stack

networks:
  ai-stack:
    name: ai-stack
    driver: bridge
  # Join the existing monitoring network created by services/monitoring.
  monitoring:
    external: true
