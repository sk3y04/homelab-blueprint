# --------------------------------------------------------------------------------
# Stirling Image — Self-Hosted Image Toolkit
# --------------------------------------------------------------------------------
# This Docker Compose configuration deploys Stirling Image, a single-container
# image processing web app with a browser UI, REST API, local SQLite storage,
# and bundled OCR / ML tooling.
#
# Services:
#   - stirling-image: Main web application for image conversion, compression,
#     OCR, background removal, resizing, and batch jobs.
#
# Networking:
#   - Exposes a single HTTP port for the web UI and REST API.
#   - Typically reverse-proxied by nginx on the VPS with TLS termination.
#
# Persistence:
#   - /data stores the SQLite database, user accounts, API keys, saved files,
#     and pipeline definitions.
#   - /tmp/workspace stores temporary processing files to avoid growth in the
#     container's writable layer during larger image jobs.
# --------------------------------------------------------------------------------

services:
  stirling-image:
    image: stirlingimage/stirling-image:latest
    container_name: stirling-image

    restart: unless-stopped

    ports:
      - "${STIRLING_IMAGE_HTTP_PORT}:1349"

    environment:
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - DEFAULT_USERNAME=${DEFAULT_USERNAME:-admin}
      - DEFAULT_PASSWORD=${DEFAULT_PASSWORD:-changeme}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-100}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-100}
      - MAX_BATCH_SIZE=${MAX_BATCH_SIZE:-200}
      - CONCURRENT_JOBS=${CONCURRENT_JOBS:-3}
      - MAX_MEGAPIXELS=${MAX_MEGAPIXELS:-100}
      - FILE_MAX_AGE_HOURS=${FILE_MAX_AGE_HOURS:-24}
      - CLEANUP_INTERVAL_MINUTES=${CLEANUP_INTERVAL_MINUTES:-30}
      - APP_NAME=${APP_NAME:-Stirling Image}
      - DEFAULT_THEME=${DEFAULT_THEME:-light}
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-en}

    volumes:
      - ${STIRLING_IMAGE_DATA_DIR}:/data
      - ${STIRLING_IMAGE_WORKSPACE_DIR}:/tmp/workspace

    # The upstream image already includes a built-in /api/v1/health check.

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '0.50'
          memory: 512M