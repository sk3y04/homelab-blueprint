# ==========================================================================
# Prometheus Scrape Configuration
# ==========================================================================
# Defines which targets Prometheus polls for metrics.
#
# Targets use the Docker bridge gateway (172.17.0.1) to reach services
# that bind ports on the Docker host, matching the existing architecture
# where the VPS also accesses services via host-bound ports.
#
# To add a new exporter, append a job under scrape_configs.
# ==========================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── Prometheus itself ───────────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Node Exporter (host metrics: CPU, RAM, disk, network) ──────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── Loki health (optional, verifies Loki is running) ───────────────────
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics

  # ── XMRig Exporter (mining hashrate, shares, pool connection) ──────────
  - job_name: "xmrig"
    static_configs:
      - targets: ["xmrig-exporter:9189"]
    metrics_path: /metrics

  # ── NVIDIA GPU Exporter (utilization, VRAM, temperature, power, clocks) ─
  - job_name: "nvidia-gpu"
    static_configs:
      - targets: ["nvidia-smi-exporter:9835"]
    metrics_path: /metrics

  # ── smartctl Exporter (drive S.M.A.R.T.: temp, hours, errors, NVMe wear)
  - job_name: "smartctl"
    static_configs:
      - targets: ["smartctl-exporter:9633"]
    metrics_path: /metrics

  # ── DCGM Exporter (datacenter-grade GPU metrics from the AI stack) ─────
  # DCGM provides richer GPU metrics than nvidia-smi-exporter: per-process
  # VRAM, PCIe throughput, ECC errors, SM occupancy, NVLink, etc.
  # The ai-dcgm-exporter container joins the 'monitoring' network via
  # services/ai-stack/docker-compose.yml (external network).
  - job_name: "dcgm-gpu"
    static_configs:
      - targets: ["ai-dcgm-exporter:9400"]
    metrics_path: /metrics
    scrape_interval: 5s
